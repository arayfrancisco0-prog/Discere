<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Notificações - Discere</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <div class="sidebar-trigger"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="header-bar">
      <div><h1>Notificações</h1><p id="unread-count"></p></div>
      <button class="btn btn-sm btn-ghost" onclick="markAllRead()">Marcar todas como lidas</button>
    </div>
    <div id="notifications-list"></div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
async function loadNotifications() {
  await checkAuth();
  if (!currentUser) { window.location.href = '/login.html'; return; }
  try {
    const data = await api('/api/notifications');
    document.getElementById('unread-count').textContent = data.unread_count ? `${data.unread_count} não lidas` : 'Todas lidas';
    const list = document.getElementById('notifications-list');
    if (!data.notifications.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><h3>Nenhuma notificação</h3><p>Você receberá notificações aqui quando tiver novidades.</p></div>';
      return;
    }
    const typeIcons = { info: 'ℹ️', success: '✅', warning: '⚠️', error: '❌' };
    list.innerHTML = data.notifications.map(n => `
      <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}', this)">
        <div class="notif-icon">${typeIcons[n.type] || 'ℹ️'}</div>
        <div class="notif-content">
          <div class="notif-title">${escapeHtml(n.title || '')}</div>
          <div class="notif-message">${escapeHtml(n.message || '')}</div>
          <div class="notif-time">${formatDate(n.created_at)}</div>
        </div>
      </div>
    `).join('');
  } catch (err) { toast(err.message, 'error'); }
}
async function markRead(id, el) {
  try { await api('/api/notifications/read', { method: 'POST', body: { id } }); el.classList.remove('unread'); } catch {}
}
async function markAllRead() {
  try {
    await api('/api/notifications/read', { method: 'POST', body: {} });
    document.querySelectorAll('.notif-item').forEach(el => el.classList.remove('unread'));
    document.getElementById('unread-count').textContent = 'Todas lidas';
    toast('Todas marcadas como lidas', 'success');
  } catch (err) { toast(err.message, 'error'); }
}
loadNotifications();
</script>
</body>
</html>
