<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Novo Curso - Discere</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <div class="sidebar-trigger"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="header-bar"><div><h1>Novo Curso</h1><p>Crie um novo curso na plataforma</p></div></div>
    <div class="card" style="max-width:700px;">
      <form id="course-form">
        <div class="form-group"><label>Título</label><input type="text" class="input" id="title" required onkeyup="generateSlug()"></div>
        <div class="form-group"><label>Slug (URL)</label><input type="text" class="input" id="slug" required></div>
        <div class="form-group"><label>Categoria</label><select class="input" id="category_id" required></select></div>
        <div class="form-group"><label>Nível</label><select class="input" id="level" required>
          <option value="BEGINNER">Iniciante</option>
          <option value="INTERMEDIATE">Intermediário</option>
          <option value="ADVANCED">Avançado</option>
        </select></div>
        <div class="form-group"><label>Descrição Curta</label><input type="text" class="input" id="short_description"></div>
        <div class="form-group"><label>Descrição Completa</label><textarea class="input" id="description" rows="5"></textarea></div>
        <div style="display:flex;gap:8px;">
          <button type="submit" class="btn btn-primary">Criar Curso</button>
          <a href="/teacher-dashboard.html" class="btn btn-ghost">Cancelar</a>
        </div>
      </form>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
async function loadCategories() {
  try {
    const cats = await api('/api/categories');
    document.getElementById('category_id').innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  } catch {}
}
function generateSlug() {
  const title = document.getElementById('title').value;
  document.getElementById('slug').value = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}
document.getElementById('course-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const data = await api('/api/courses/create', { method: 'POST', body: {
      title: document.getElementById('title').value,
      slug: document.getElementById('slug').value,
      category_id: document.getElementById('category_id').value,
      level: document.getElementById('level').value,
      short_description: document.getElementById('short_description').value,
      description: document.getElementById('description').value
    }});
    window.location.href = `/teacher-edit.html?id=${data.id}`;
  } catch (err) { toast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Criar Curso'; }
});
loadCategories();
</script>
</body>
</html>
