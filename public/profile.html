<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Perfil - Discere</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <div class="sidebar-trigger"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="header-bar"><div><h1>Meu Perfil</h1><p>Gerencie suas informações</p></div></div>
    <div class="profile-header">
      <div class="avatar" id="profile-avatar">?</div>
      <div>
        <h2 id="profile-name"></h2>
        <p id="profile-email" style="color:var(--fg-muted);"></p>
        <p id="profile-points" style="font-size:0.9rem;color:var(--fg-muted);"></p>
        <p id="profile-date" style="font-size:0.8rem;color:var(--fg-muted);"></p>
      </div>
    </div>
    <div class="card" style="max-width:600px;margin-bottom:32px;">
      <h3 style="margin-bottom:16px;">Editar Perfil</h3>
      <form id="profile-form">
        <div class="form-group"><label>Nome</label><input type="text" class="input" id="name" required></div>
        <div class="form-group"><label>Email</label><input type="email" class="input" id="email" disabled></div>
        <div class="form-group"><label>Bio</label><textarea class="input" id="bio" rows="3" placeholder="Conte um pouco sobre você"></textarea></div>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </form>
    </div>
    <h2 class="section-title">Conquistas</h2>
    <div class="grid grid-4" id="badges-grid"></div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
async function loadProfile() {
  await checkAuth();
  if (!currentUser) { window.location.href = '/login.html'; return; }
  document.getElementById('profile-avatar').textContent = getInitials(currentUser.name);
  document.getElementById('profile-name').textContent = currentUser.name;
  document.getElementById('profile-email').textContent = currentUser.email;
  document.getElementById('profile-points').textContent = currentUser.studentProfile ? `⭐ ${currentUser.studentProfile.totalPoints || 0} pontos` : '';
  document.getElementById('profile-date').textContent = `Membro desde ${formatDate(currentUser.created_at)}`;
  document.getElementById('name').value = currentUser.name || '';
  document.getElementById('email').value = currentUser.email || '';
  document.getElementById('bio').value = currentUser.bio || '';

  try {
    const badges = await api('/api/badges');
    const badgeIcons = { 'first-login': '🚀', 'first-course': '📚', 'first-exercise': '💻', 'ten-exercises': '🔥', 'course-completed': '🎓', 'python-expert': '🐍', 'javascript-expert': '🟨', 'java-expert': '☕', 'star-student': '⭐' };
    document.getElementById('badges-grid').innerHTML = badges.map(b => `
      <div class="card" style="text-align:center;padding:16px;${b.earned_at ? '' : 'opacity:0.4;'}">
        <div style="font-size:2rem;margin-bottom:8px;">${badgeIcons[b.slug] || '🏅'}</div>
        <div style="font-weight:600;font-size:0.85rem;">${escapeHtml(b.name)}</div>
        <div style="font-size:0.75rem;color:var(--fg-muted);margin-top:4px;">${b.earned_at ? `✅ ${formatDate(b.earned_at)}` : '🔒 Não conquistada'}</div>
      </div>
    `).join('');
  } catch {}
}

document.getElementById('profile-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api('/api/users/profile', { method: 'PUT', body: { name: document.getElementById('name').value, bio: document.getElementById('bio').value } });
    toast('Perfil atualizado!', 'success');
    currentUser.name = document.getElementById('name').value;
    currentUser.bio = document.getElementById('bio').value;
    document.getElementById('profile-avatar').textContent = getInitials(currentUser.name);
    document.getElementById('profile-name').textContent = currentUser.name;
  } catch (err) { toast(err.message, 'error'); }
});
loadProfile();
</script>
</body>
</html>
