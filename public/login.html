<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Entrar - Discere</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body class="login-page">
<div class="card auth-card" style="padding:32px;">
  <div style="text-align:center;margin-bottom:24px;">
    <div class="logo" style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Discere</div>
    <p style="color:var(--fg-muted);font-size:0.85rem;margin-top:4px;">Entre na sua conta para continuar</p>
  </div>
  <form id="login-form">
    <div class="form-group"><label>Email</label><input type="email" class="input" id="email" placeholder="seu@email.com" required></div>
    <div class="form-group"><label>Senha</label><input type="password" class="input" id="password" placeholder="Sua senha" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="login-btn">Entrar</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:0.9rem;color:var(--fg-muted);">Não tem conta? <a href="/register.html">Cadastre-se</a></p>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    await api('/api/auth/login', { method: 'POST', body: { email: document.getElementById('email').value, password: document.getElementById('password').value } });
    window.location.href = '/dashboard.html';
  } catch (err) { toast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Entrar'; }
});
</script>
</body>
</html>
