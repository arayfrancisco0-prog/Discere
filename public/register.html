<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cadastrar - Discere</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body class="login-page">
<div class="card auth-card" style="padding:32px;">
  <div style="text-align:center;margin-bottom:24px;">
    <div class="logo" style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Discere</div>
    <p style="color:var(--fg-muted);font-size:0.85rem;margin-top:4px;">Comece sua jornada de aprendizado</p>
  </div>
  <div class="auth-toggle" id="role-toggle">
    <button class="active" data-role="STUDENT">Aluno</button>
    <button data-role="TEACHER">Professor</button>
  </div>
  <form id="register-form">
    <div class="form-group"><label>Nome completo</label><input type="text" class="input" id="name" placeholder="Seu nome" required></div>
    <div class="form-group"><label>Email</label><input type="email" class="input" id="email" placeholder="seu@email.com" required></div>
    <div class="form-group"><label>Senha</label><input type="password" class="input" id="password" placeholder="Mínimo 6 caracteres" required minlength="6"></div>
    <div class="form-group"><label>Confirmar senha</label><input type="password" class="input" id="confirm" placeholder="Repita a senha" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="register-btn">Criar Conta</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:0.9rem;color:var(--fg-muted);">Já tem conta? <a href="/login.html">Entrar</a></p>
</div>
<script src="/js/api.js"></script>
<script>
let selectedRole = 'STUDENT';
document.getElementById('role-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#role-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRole = btn.dataset.role;
});
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (pwd !== confirm) { toast('Senhas não conferem', 'error'); return; }
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    await api('/api/auth/register', { method: 'POST', body: { name: document.getElementById('name').value, email: document.getElementById('email').value, password: pwd, role: selectedRole } });
    window.location.href = selectedRole === 'TEACHER' ? '/teacher-dashboard.html' : '/dashboard.html';
  } catch (err) { toast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Criar Conta'; }
});
</script>
</body>
</html>
