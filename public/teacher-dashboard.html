<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Painel do Professor - Discere</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <div class="sidebar-trigger"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="header-bar">
      <div><h1>Painel do Professor</h1><p>Gerencie seus cursos</p></div>
      <a href="/teacher-create.html" class="btn btn-primary">+ Novo Curso</a>
    </div>
    <div class="stat-grid" id="stats-grid"></div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Curso</th><th>Categoria</th><th>Matrículas</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="courses-table"></tbody>
      </table>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
async function loadTeacherDashboard() {
  await checkAuth();
  if (!currentUser) { window.location.href = '/login.html'; return; }
  if (currentUser.role !== 'TEACHER') { window.location.href = '/dashboard.html'; return; }
  try {
    const courses = await api('/api/courses/teacher/all');
    const total = courses.length;
    const published = courses.filter(c => c.published).length;
    const students = courses.reduce((sum, c) => sum + (c.enrollment_count || 0), 0);
    document.getElementById('stats-grid').innerHTML = `
      <div class="card stat-card"><div class="stat-value">${total}</div><div class="stat-label">📚 Total de Cursos</div></div>
      <div class="card stat-card"><div class="stat-value">${students}</div><div class="stat-label">👥 Total de Alunos</div></div>
      <div class="card stat-card"><div class="stat-value">${published}</div><div class="stat-label">✅ Publicados</div></div>
    `;
    document.getElementById('courses-table').innerHTML = courses.map(c => `
      <tr>
        <td><strong>${escapeHtml(c.title)}</strong></td>
        <td><span class="badge badge-primary">${escapeHtml(c.category_name || '')}</span></td>
        <td>${c.enrollment_count || 0}</td>
        <td>${c.published ? '<span class="badge badge-accent">Publicado</span>' : '<span class="badge badge-warning">Rascunho</span>'}</td>
        <td>
          <a href="/teacher-edit.html?id=${c.id}" class="btn btn-sm btn-ghost">Editar</a>
          <a href="/course.html?slug=${c.slug}" class="btn btn-sm btn-ghost">Ver</a>
        </td>
      </tr>
    `).join('');
  } catch (err) { toast(err.message, 'error'); }
}
loadTeacherDashboard();
</script>
</body>
</html>
