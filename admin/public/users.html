<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Usuários - Admin Discere</title><link rel="stylesheet" href="/css/admin.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Discere Admin</div>
    <nav class="sidebar-nav">
      <a href="/">📊 Dashboard</a>
      <a href="/users.html" class="active">👥 Usuários</a>
      <a href="/courses.html">📚 Cursos</a>
      <a href="/categories.html">🏷️ Categorias</a>
      <a href="/badges.html">🏆 Badges</a>
      <a href="/settings.html">⚙️ Configurações</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info" id="admin-info"></div>
      <button onclick="logout()">🚪 Sair</button>
    </div>
  </aside>
  <main class="main">
    <div class="header-bar">
      <div>
        <h1>Usuários</h1>
        <p>Gerenciar usuários da plataforma</p>
      </div>
    </div>
    <div class="table-wrapper" id="users-table"></div>
  </main>
</div>
<script src="/js/admin.js"></script>
<script>
async function loadUsers() {
  await checkAuth();
  document.getElementById('admin-info').textContent = `👤 ${adminUser.name}`;
  const users = await api('/api/users');
  document.getElementById('users-table').innerHTML = `
    <table>
      <thead><tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Cadastro</th><th>Ações</th></tr></thead>
      <tbody>${users.map(u => `
        <tr>
          <td>${escapeHtml(u.name)}</td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="badge badge-primary">${u.role}</span></td>
          <td>${formatDate(u.created_at)}</td>
          <td>${u.id !== adminUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Excluir</button>` : '<span style="color:var(--fg-muted);font-size:0.8rem;">Você</span>'}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

async function deleteUser(id) {
  if (!confirm('Excluir este usuário?')) return;
  try {
    await api(`/api/users/${id}`, { method: 'DELETE' });
    toast('Usuário excluído', 'success');
    loadUsers();
  } catch (err) { toast(err.message, 'error'); }
}

loadUsers();
</script>
</body>
</html>
