<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Configurações - Admin Discere</title><link rel="stylesheet" href="/css/admin.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Discere Admin</div>
    <nav class="sidebar-nav">
      <a href="/">📊 Dashboard</a>
      <a href="/users.html">👥 Usuários</a>
      <a href="/courses.html">📚 Cursos</a>
      <a href="/categories.html">🏷️ Categorias</a>
      <a href="/badges.html">🏆 Badges</a>
      <a href="/settings.html" class="active">⚙️ Configurações</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info" id="admin-info"></div>
      <button onclick="logout()">🚪 Sair</button>
    </div>
  </aside>
  <main class="main">
    <div class="header-bar">
      <div>
        <h1>Configurações</h1>
        <p>Gerenciar configurações da plataforma</p>
      </div>
    </div>
    <div class="card" style="max-width:600px;">
      <h3 style="margin-bottom:16px;">Vídeo de Boas-Vindas</h3>
      <p style="font-size:0.85rem;color:var(--fg-muted);margin-bottom:16px;">URL do vídeo institucional exibido para novos alunos ao fazer login.</p>
      <form id="settings-form">
        <div class="form-group">
          <label>URL do Vídeo</label>
          <input type="url" class="input" id="welcomeVideo" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </form>
    </div>
  </main>
</div>
<script src="/js/admin.js"></script>
<script>
async function loadSettings() {
  await checkAuth();
  document.getElementById('admin-info').textContent = `👤 ${adminUser.name}`;
  const settings = await api('/api/settings');
  document.getElementById('welcomeVideo').value = settings.welcomeVideo || '';
}

document.getElementById('settings-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api('/api/settings', { method: 'PUT', body: { welcomeVideo: document.getElementById('welcomeVideo').value } });
    toast('Configurações salvas!', 'success');
  } catch (err) { toast(err.message, 'error'); }
});

loadSettings();
</script>
</body>
</html>
