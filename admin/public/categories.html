<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Categorias - Admin Discere</title><link rel="stylesheet" href="/css/admin.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Discere Admin</div>
    <nav class="sidebar-nav">
      <a href="/">📊 Dashboard</a>
      <a href="/users.html">👥 Usuários</a>
      <a href="/courses.html">📚 Cursos</a>
      <a href="/categories.html" class="active">🏷️ Categorias</a>
      <a href="/badges.html">🏆 Badges</a>
      <a href="/settings.html">⚙️ Configurações</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info" id="admin-info"></div>
      <button onclick="logout()">🚪 Sair</button>
    </div>
  </aside>
  <main class="main">
    <div class="header-bar">
      <div>
        <h1>Categorias</h1>
        <p>Gerenciar categorias de cursos</p>
      </div>
    </div>
    <div class="card" style="margin-bottom:24px;">
      <h3 style="margin-bottom:12px;">Nova Categoria</h3>
      <form id="category-form" class="inline-form">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" class="input" id="cat-name" placeholder="Ex: Python" required>
        </div>
        <div class="form-group">
          <label>Slug</label>
          <input type="text" class="input" id="cat-slug" placeholder="Ex: python" required>
        </div>
        <button type="submit" class="btn btn-accent" style="margin-bottom:2px;">+ Adicionar</button>
      </form>
    </div>
    <div class="table-wrapper" id="categories-table"></div>
  </main>
</div>
<script src="/js/admin.js"></script>
<script>
async function loadCategories() {
  await checkAuth();
  document.getElementById('admin-info').textContent = `👤 ${adminUser.name}`;
  const cats = await api('/api/admin-categories');
  document.getElementById('categories-table').innerHTML = `
    <table>
      <thead><tr><th>Nome</th><th>Slug</th><th>Cursos</th><th>Ações</th></tr></thead>
      <tbody>${cats.map(c => `
        <tr>
          <td>${escapeHtml(c.name)}</td>
          <td><code>${escapeHtml(c.slug)}</code></td>
          <td>${c.course_count || 0}</td>
          <td><button class="btn btn-sm btn-danger" onclick="deleteCategory('${c.id}')">Excluir</button></td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

document.getElementById('category-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api('/api/admin-categories', { method: 'POST', body: { name: document.getElementById('cat-name').value, slug: document.getElementById('cat-slug').value } });
    toast('Categoria criada!', 'success');
    document.getElementById('cat-name').value = '';
    document.getElementById('cat-slug').value = '';
    loadCategories();
  } catch (err) { toast(err.message, 'error'); }
});

async function deleteCategory(id) {
  if (!confirm('Excluir esta categoria?')) return;
  try {
    await api(`/api/admin-categories/${id}`, { method: 'DELETE' });
    toast('Categoria excluída', 'success');
    loadCategories();
  } catch (err) { toast(err.message, 'error'); }
}

loadCategories();
</script>
</body>
</html>
